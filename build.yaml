include:
  # 1. The Dongle (Acts as the Central Brain)
  - board: nice_nano_v2
    shield: lily58_left
    artifact-name: dongle

  # 2. The Physical Left Half (Forced to be a Peripheral)
  - board: nice_nano_v2
    shield: lily58_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: left_peripheral

  # 3. The Physical Right Half (Peripheral by default)
  - board: nice_nano_v2
    shield: lily58_right
    artifact-name: right_peripheral
